<div class="email-card">
    <div class="email-header">
        <span class="email-sender">{sender}</span>
        <div class="email-badges">
            <span class="email-category">{category}</span>
            <span class="preference-badge {pref_class}">{preference} ({confidence}%)</span>
        </div>
    </div>
    <div class="email-subject">{subject}</div>
    <div class="email-date">{date}</div>
    <div class="email-snippet">{snippet}</div>
    <div class="pref-footer">Source: {source}</div>
</div>
