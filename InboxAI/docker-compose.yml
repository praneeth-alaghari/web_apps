version: '3.8'

services:
  inboxai:
    build: .
    container_name: inboxai_app
    ports:
      - "10000:10000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      # Note: Make sure to map .env vars for OpenAI & Gmail keys, or mount a volume for .env
    env_file:
      - .env
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    container_name: inboxai_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
